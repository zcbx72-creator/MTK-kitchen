.highlight-orange{color:#ff7700!important;font-weight:600;}
.data-table{width:100%;border-collapse:collapse;margin-bottom:20px;table-layout:fixed;background:#fff;}
.data-table th,.data-table td{border:1px solid #eee;padding:8px 4px;text-align:center;font-size:.97rem;word-break:break-all;}
.data-table th{background:#f5f5f5;font-weight:600;color:#555;}

/* ---------- Email 正規化 / 檢查 ---------- */
function validateAndSanitizeEmails(emailStr) {
  // 1. 全形分號 → 半形分號
  let cleaned = emailStr.replace(/；/g, ';');
  // 2. 移除所有空白（包含換行、Tab）
  cleaned = cleaned.replace(/\s+/g, '');
  // 3. 以 ; 或 , 為分隔符切割
  const parts = cleaned.split(/[;,]/).filter(e => e);
  // 4. 判斷每一個是否為合法的 email
  const invalids = parts.filter(e => !/^[\w.-]+@[\w.-]+\.\w+$/.test(e));
  return {
    cleaned,                     // 已清理的字串（仍保留分號或逗號）
    valid: invalids.length === 0, // true → 全部合法
    invalids                     // 若有非法的 email，會陣列回傳
  };
}

/* iPhone 用來把所有分號轉成逗號的簡易 wrapper */

  let txt = email.replace(/；/g, ';').replace(/\s+/g, '');

/* === 表格維護：是否顯示子分頁 (後台設定) === */
function getVendorFormsConfig(site, name){
  const forms = JSON.parse(localStorage.getItem(LS_FORMS_KEY)||'[]');
  return forms.find(f=>f.site===site && f.name===name) || null;
}
function isSubTabEnabledByAdmin(mainKey, subKey, formsCfg){
  if(mainKey==='penalty') return true;
  if(!formsCfg) return true;
  const map = {
    cold:    formsCfg.cold,
    vendor:  formsCfg.vendor,
    oil:     formsCfg.oil,
    storage: formsCfg.storage,
    water:   formsCfg.water,
    safety:  formsCfg.safety
  };
  return !!map[subKey];
}

/* === 產生 NA 文字 (後台關掉時使用) === */
function buildNAFormMailText(subKey, mainKey){
  const join = arr=>arr.map(x=>`${x.t}，${x.v}`).join('；\n');
  if(subKey==='cold'){
    const a=[];
    a.push({t:'點檢員簽名',v:'NA'});
    a.push({t:'常溫1冷藏溫度',v:'NA (無此設備)'});
    for(let i=1;i<=7;i++){
      a.push({t:`A${i}冷藏溫度`, v:'NA (無此設備)'});
      a.push({t:`B${i}冷凍溫度`, v:'NA (無此設備)'});
      a.push({t:`A${i}/B${i}異常備註`, v:'NA (無此設備)'});
    }
    return join(a);
  }
  if(subKey==='vendor'){
    const items = (mainKey==='early') ? VENDOR_CHECK_ITEMS_EARLY : VENDOR_CHECK_ITEMS_NIGHT;
    const a = items.map(t=>({t, v:'NA (無此設備)'}));
    a.push({t:'點檢員簽名', v:'NA'});
    return join(a);
  }
  if(subKey==='oil'){
    const a=[
      {t:'今天將使用油炸油', v:'NA (無此設備)'},
      {t:'油顏色太深', v:'NA (無此設備)'},
      {t:'油品泡沫', v:'NA (無此設備)'},
      {t:'油炸油發煙', v:'NA (無此設備)'},
      {t:'酸價檢測（mgKOH/g）', v:'NA (無此設備)'},
      {t:'今日是否更換全新油炸油', v:'NA (無此設備)'},
      {t:'點檢員簽名', v:'NA'}
    ];
    return join(a);
  }
  if(subKey==='storage'){
    const a=[
      {t:'點檢員簽名', v:'NA'},
      {t:'溫度(°C)', v:'NA (無此設備)'},
      {t:'濕度(%)', v:'NA (無此設備)'},
      {t:'異常/備註', v:'NA (無此設備)'}
    ];
    return join(a);
  }
  if(subKey==='water'){
    const a=[
      {t:'抄表度數', v:'NA (無此設備)'},
      {t:'異常/備註', v:'NA (無此設備)'},
      {t:'點檢員簽名', v:'NA'}
    ];
    return join(a);
  }
  if(subKey==='safety'){
    const items=[
      "爐火是否確實關閉","瓦斯偵測器是否正常","瓦斯遮斷系統是否正常","廚房有無瓦斯洩漏異味",
      "瓦斯分盤閥門是否確實關閉","滅火器壓力、外觀是否正常","瓦斯總筏是否確實關閉"
    ];
    const a=items.map(t=>({t, v:'NA (無此設備)'}));
    a.push({t:'點檢員簽名', v:'NA'});
    return join(a);
  }
  return '';
}

/* === 後台自動把關閉的子分頁視為完成 (含 mailText) === */
function autoMarkDisabledSubTabsAsDone(mainKey){
  const site = document.getElementById('site').value;
  const vendor = document.getElementById('vendor').value;
  if(!site || !vendor) return;
  const formsCfg = getVendorFormsConfig(site, vendor);
  if(!formsCfg) return;
  const schedule = SCHEDULES.find(s=>s.key===mainKey);
  schedule.subTabs.forEach(st=>{
    if(!isSubTabEnabledByAdmin(mainKey, st.key, formsCfg)){
      if(!formData[mainKey][st.key]){
        formData[mainKey][st.key] = {
          data:{},
          mailText: buildNAFormMailText(st.key, mainKey)
        };
      }
    }
  });
}

/* === Nav 渲染 === */
function renderMainNav(){
  const wrap = document.getElementById('main-navbar');
  wrap.innerHTML = SCHEDULES.map((s,i)=>`
    <a href="#" class="main-tab${i===0?' active':''}" data-main="${s.key}"
       onclick="switchMainTab('${s.key}');return false;">${s.label}</a>
  `).join('');
}
function renderSubNav(mainKey, curSubKey){
  const sch = SCHEDULES.find(s=>s.key===mainKey);
  const site = document.getElementById('site').value;
  const vendor = document.getElementById('vendor').value;
  const formsCfg = (site && vendor) ? getVendorFormsConfig(site, vendor) : null;
  const visible = (sch.subTabs||[]).filter(st=>isSubTabEnabledByAdmin(mainKey, st.key, formsCfg));
  // 若目前的子頁已被關掉，跳到第一個可見子頁
  if(visible.length && !visible.some(v=>v.key===curSubKey)){
    currentSubTab = visible[0].key;
    curSubKey = currentSubTab;
  }
  const html = visible.map(st=>`
    <a href="#" class="sub-tab${curSubKey===st.key?' active':''} ${formData[mainKey][st.key]?'done-sub':''}"
       data-sub="${st.key}"
       onclick="switchSubTab('${st.key}');return false;">
      ${st.label}${formData[mainKey][st.key] ? '<span class="done-indicator">✓</span>' : ''}
    </a>
  `).join('');
  document.getElementById('sub-navbar').innerHTML = html;
}
function switchMainTab(mainKey){
  currentMainTab = mainKey;
  autoMarkDisabledSubTabsAsDone(mainKey);
  const idx = SCHEDULES.findIndex(s=>s.key===mainKey);
  document.querySelectorAll('.main-navbar a').forEach((el,i)=>{
    el.classList.toggle('active', i===idx);
  });
  // 找第一個可見 subtab
  const site = document.getElementById('site').value;
  const vendor = document.getElementById('vendor').value;
  const formsCfg = (site && vendor) ? getVendorFormsConfig(site, vendor) : null;
  const visible = SCHEDULES[idx].subTabs.filter(st=>isSubTabEnabledByAdmin(mainKey, st.key, formsCfg));
  const firstSub = visible.length ? visible[0].key : SCHEDULES[idx].subTabs[0].key;
  currentSubTab = firstSub;
  renderSubNav(mainKey, firstSub);
  switchSubTab(firstSub);
}
function switchSubTab(subKey){
  currentSubTab = subKey;
  document.querySelectorAll('.sub-navbar a').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('data-sub')===subKey);
  });
  renderTabPage(currentMainTab, subKey);
}

/* ==============================
   4?? 完成本項目（產生 mailText）
============================== */
function saveSubForm(ev, mainKey, subKey){
  ev.preventDefault();
  const wrap = document.getElementById('tabContent');
  const inputs = Array.from(wrap.querySelectorAll('input,select,textarea'));
  let fail=false, collected={};

  for(const el of inputs){
    const req=el.required, val=el.value.trim();
    if(req && !el.disabled && (val==='' || val==='請選擇')){
      fail=true; break;
    }
    if(el.name){
      collected[el.name] = (el.disabled || val==='' || val==='請選擇') ? 'NA' : val;
    }
  }
  if(fail){ alert('請填寫所有欄位'); return; }

  // 計算 mailText
  const mailFields=[];
  if(subKey==='cold'){
    mailFields.push({title:'點檢員簽名', value:collected['signature']||'NA'});

    // 常溫（若有）
    const vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'[]');
    const site=document.getElementById('site').value;
    const vendor=document.getElementById('vendor').value;
    const vc=vendors.find(v=>v.site===site && v.name===vendor)||{};
    if(vc.constantTemp){
      mailFields.push({title:'常溫1冷藏溫度', value:collected['constant1_r']||'NA'});
    }else{
      mailFields.push({title:'常溫1冷藏溫度', value:'NA (無此設備)'});
    }

    const maxA = vc.refrigeratorA||0;
    const maxB = vc.refrigeratorB||0;
    for(let i=1;i<=7;i++){
      if(i<=maxA) mailFields.push({title:`A${i}冷藏溫度`, value:collected[`A${i}_r`]||'NA'});
      else       mailFields.push({title:`A${i}冷藏溫度`, value:'NA (無此設備)'});

      if(i<=maxB) mailFields.push({title:`B${i}冷凍溫度`, value:collected[`B${i}_f`]||'NA'});
      else       mailFields.push({title:`B${i}冷凍溫度`, value:'NA (無此設備)'});

      if(i<=maxA || i<=maxB){
        mailFields.push({title:`A${i}/B${i}異常備註`, value:collected[`A${i}_B${i}_note`]||'NA'});
      }else{
        mailFields.push({title:`A${i}/B${i}異常備註`, value:'NA (無此設備)'});
      }
    }
  }else if(subKey==='storage'){
    mailFields.push({title:'點檢員簽名', value:collected['signature']||'NA'});
    const vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'[]');
    const site=document.getElementById('site').value;
    const vendor=document.getElementById('vendor').value;
    const vc=vendors.find(v=>v.site===site && v.name===vendor)||{};
    if(vc.storageRoom){
      mailFields.push({title:'溫度(°C)', value:collected['temp']||'NA'});
      mailFields.push({title:'濕度(%)', value:collected['humi']||'NA'});
      mailFields.push({title:'異常處理/備註', value:collected['comment']||'NA'});
    }else{
      mailFields.push({title:'溫度(°C)', value:'NA (無此設備)'});
      mailFields.push({title:'濕度(%)', value:'NA (無此設備)'});
      mailFields.push({title:'異常處理/備註', value:'NA (無此設備)'});
    }
  }else{
    // 其他子頁直接把所有欄位寫入
    for(const el of inputs){
      const title = el.getAttribute('data-title');
      if(title){
        mailFields.push({title, value:collected[el.name]||'NA'});
      }
    }
  }

  const mailText = mailFields.map(f=>`${f.title}，${f.value}`).join('；\n');
  formData[mainKey][subKey] = {data:collected, mailText};

  renderSubNav(mainKey, subKey);

  // 自動跳下一個未完成的子頁
  const schTabs = SCHEDULES.find(s=>s.key===mainKey).subTabs;
  const curIdx = schTabs.findIndex(t=>t.key===subKey);
  const site = document.getElementById('site').value;
  const vendor = document.getElementById('vendor').value;
  const formsCfg = (site && vendor) ? getVendorFormsConfig(site, vendor) : null;
  let nextFound=false;
  for(let i=curIdx+1;i<schTabs.length;i++){
    const nextKey = schTabs[i].key;
    // 若後台關掉，直接視為完成
    if(formsCfg && !isSubTabEnabledByAdmin(mainKey, nextKey, formsCfg)){
      if(!formData[mainKey][nextKey]){
        formData[mainKey][nextKey] = {data:{}, mailText: buildNAFormMailText(nextKey, mainKey)};
      }
      continue;
    }
    if(!formData[mainKey][nextKey]){
      switchSubTab(nextKey);
      nextFound=true;
      break;
    }
  }
  if(!nextFound) alert("本時段所有檢查項目已完成!");
}

function syncVendorMenus(){
  const siteSel = document.getElementById('site');
  const vendorSel = document.getElementById('vendor');
  const vendorEmail = document.getElementById('vendorEmail');
  const vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'[]');

  const sites = [...new Set(vendors.map(v=>v.site))].sort();
  siteSel.innerHTML = '<option value="">請選擇</option>' + sites.map(s=>`<option value="${s}">${s}</option>`).join('');

  // Site 改變
  siteSel.onchange = function(){
    const s = siteSel.value;
    const vs = vendors.filter(v=>v.site===s);
    vendorSel.innerHTML = '<option value="">請選擇</option>' + vs.map(v=>`<option value="${v.name}">${v.name}</option>`).join('');
    vendorSel.value=''; vendorEmail.value='';

    // 清除 iPhone 區塊（避免舊資料殘留）
    const iphoneCheck = document.getElementById('isIphoneCheckbox');
    const iphoneNote  = document.getElementById('isIphoneNote');
    if(iphoneCheck){ iphoneCheck.checked=false; iphoneNote.textContent=''; }

    document.getElementById('tabContent').innerHTML='';
    document.getElementById('notice').textContent='請選擇廠商以載入點檢項目。';
    renderSubNav(currentMainTab, currentSubTab);
  };

  // Vendor 改變
  vendorSel.onchange = function(){
    const s = siteSel.value, n = vendorSel.value;
    const v = vendors.find(x=>x.site===s && x.name===n);
    // 直接使用已正規化過的 email
    vendorEmail.value = (v && v.email) ? v.email : '';

    // **iPhone 勾選區塊** 顯示與同步
    const iphoneCheck = document.getElementById('isIphoneCheckbox');
    const iphoneNote  = document.getElementById('isIphoneNote');
    if(v && iphoneCheck){
      iphoneCheck.checked = !!v.isIphone;
      iphoneNote.textContent = v.isIphone
        ? "此廠商預設用 iPhone 裝置寄信，email 分隔符為「,」"
        : "使用非 iPhone 裝置，分隔符為「;」。";
      // 勾選變更即時寫回 localStorage
      iphoneCheck.onchange = ()=>{
        v.isIphone = iphoneCheck.checked;
        const all = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'[]');
        const idx = all.findIndex(x=>x.site===s && x.name===n);
        if(idx>=0){
          all[idx].isIphone = v.isIphone;
          localStorage.setItem(LS_VENDORS_KEY, JSON.stringify(all));
        }
        iphoneNote.textContent = iphoneCheck.checked
          ? "此廠商預設用 iPhone 裝置寄信，email 分隔符為「,」"
          : "使用非 iPhone 裝置，分隔符為「;」。";
      };
    }

    // 若已選取廠商，初始化自動完成後台「無」的子頁
    if(currentMainTab!=='penalty' && s && n){
      autoMarkDisabledSubTabsAsDone(currentMainTab);
      renderSubNav(currentMainTab, currentSubTab);
      renderTabPage(currentMainTab, currentSubTab);
    }else if(currentMainTab!=='penalty'){
      document.getElementById('tabContent').innerHTML='';
      document.getElementById('notice').textContent='請選擇廠商以載入點檢項目。';
    }
  };
}

document.getElementById('mainSubmitBtn').onclick = function(){
  const date = document.getElementById('date').value;
  const site = document.getElementById('site').value;
  const vendor = document.getElementById('vendor').value;
  const vendorEmail = document.getElementById('vendorEmail').value;
  if(!date||!site||!vendor||!vendorEmail){
    alert('請先填寫上方 日期、辦公區、廠商名稱、EMAIL'); return;
  }

  // night 時段若全部「無」則不寄信
  if(currentMainTab==='night'){
    const cfg = getVendorFormsConfig(site, vendor);
    if(cfg && !cfg.vendor && !cfg.water && !cfg.safety){
      alert("晚間下班離開前：後台三項皆設定為無，視為已完成，無需寄送郵件。");
      return;
    }
  }

  // 確保已把後台關掉的子頁視為完成
  autoMarkDisabledSubTabsAsDone(currentMainTab);

  // 檢查所有子頁是否都有資料
  const sch = SCHEDULES.find(s=>s.key===currentMainTab);
  for(const sub of sch.subTabs){
    if(!formData[currentMainTab][sub.key]){
      alert(`尚未完成【${sub.label}】，請點入填寫並按「完成本項目」!`);
      return;
    }
  }

  // 組內容
  const contentList = sch.subTabs.map(sub=>`【${sub.label}】\n${formData[currentMainTab][sub.key].mailText}\n`);

  // 記錄至 records
  const records = JSON.parse(localStorage.getItem(LS_RECORDS_KEY)||'[]');
  sch.subTabs.forEach(sub=>{
    records.push({
      date,
      time:new Date().toLocaleTimeString(),
      site,
      vendor,
      email:vendorEmail,
      stage:sub.label,
      content:formData[currentMainTab][sub.key].mailText
    });
  });
  localStorage.setItem(LS_RECORDS_KEY, JSON.stringify(records));

  // ======== 產生 mailto ========
  const subject = encodeURIComponent(`${sch.label}_${vendor}（${date}，${site}）`);
  const body = encodeURIComponent(
    `日期，${date}；\n辦公區，${site}；\n廠商名稱，${vendor}；\nEMAIL，${vendorEmail}；\n——————\n${contentList.join('\n')}`
  );

  const mailInfo = getMailInfo(site);
  const baseTo = mailInfo.mailto;
  const ccRaw   = mailInfo.cc;

  // 依 iPhone 判斷分隔符號
  const vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'[]');
  const curVendor = vendors.find(v=>v.site===site && v.name===vendor);
  const separator = (curVendor && curVendor.isIphone) ? ',' : ';';

  // 1?? 把廠商 Email 先清理半形分號，並依 iPhone 需要轉成逗號
  let vendorMail = vendorEmail.replace(/；/g, ';');
  if (curVendor && curVendor.isIphone) {
    vendorMail = vendorMail.replace(/;/g, ',');
  }

  const recipients = [baseTo, vendorMail].filter(x=>x).join(separator);

/* 新增廠商 */
window.newVendor=function(){
  const vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'[]');
  const allSites = [...new Set(EXCEL_VENDORS.map(v=>v.site))];
  const defaultSite = allSites[0];
  const nameList = site=>EXCEL_VENDORS.filter(v=>v.site===site).map(v=>v.name);
  const nameOptions = nameList(defaultSite);

  adminShowModal('新增廠商',[
    {label:'辦公區', name:'site', type:'select', options: allSites},
    {label:'廠商名稱', name:'name', type:'select', options: nameOptions},
    {label:'廠商 EMAIL（如有多位，請用分號「;」分隔）', name:'email', type:'email'},
    {label:'是否為 iPhone 裝置', name:'isIphone', type:'checkbox', value:false}
  ],(data)=>{
    // ★★★★★ 檢查 Email
    const emailChk = validateAndSanitizeEmails(data.email||'');
    if (!emailChk.valid) {
      alert('以下 Email 格式不正確，請修正後再送出:\n' + emailChk.invalids.join('\n'));
      return;
    }
    data.email = emailChk.cleaned; // 正規化後儲存

    vendors.push({
      ...data,
      refrigeratorA:0, refrigeratorB:0,
      constantTemp:false, storageRoom:false,
      isIphone: !!data.isIphone
    });
    localStorage.setItem(LS_VENDORS_KEY, JSON.stringify(vendors));
    adminNav('vendor');
    syncVendorMenus();
  },{linked:true, EXCEL_VENDORS});
};

/* 編輯廠商 */
window.editVendor=function(i){
  const vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'[]');
  const v = vendors[i];
  const allSites = [...new Set(EXCEL_VENDORS.map(vv=>vv.site))];
  const nameList = site=>EXCEL_VENDORS.filter(vv=>vv.site===site).map(vv=>vv.name);
  const siteOptions = allSites.includes(v.site) ? allSites : [...allSites, v.site];
  const nameOptions = nameList(v.site);
  if(!nameOptions.includes(v.name)) nameOptions.push(v.name);

  adminShowModal('編輯廠商',[
    {label:'辦公區', name:'site', type:'select', options: siteOptions, value:v.site},
    {label:'廠商名稱', name:'name', type:'select', options: nameOptions, value:v.name},
    {label:'廠商 EMAIL（如有多位，請用分號「;」分隔）', name:'email', type:'email', value:v.email},
    {label:'是否為 iPhone 裝置', name:'isIphone', type:'checkbox', value:!!v.isIphone}
  ],(data)=>{
    // ★★★★★ 檢查 Email
    const emailChk = validateAndSanitizeEmails(data.email||'');
    if (!emailChk.valid) {
      alert('以下 Email 格式不正確，請修正後再送出:\n' + emailChk.invalids.join('\n'));
      return;
    }
    data.email = emailChk.cleaned; // 正規化後儲存

    vendors[i] = {
      ...vendors[i],
      site:data.site,
      name:data.name,
      email:data.email,
      isIphone: !!data.isIphone
    };
    localStorage.setItem(LS_VENDORS_KEY, JSON.stringify(vendors));
    adminNav('vendor');
    syncVendorMenus();
  },{linked:true, EXCEL_VENDORS});
};

window.editFormsConfig=function(idx){

    {label:'油脂品質檢查', name:'oil', type:'select', options:[{value:'true',text:'有'},{value:'false',text:'無'}], value:String(cur.oil)},
    {label:'庫房溫度', name:'storage', type:'select', options:[{value:'true',text:'有'},{value:'false',text:'無'}], value:String(cur.storage)},
    {label:'水表紀錄', name:'water', type:'select', options:[{value:'true',text:'有'},{value:'false',text:'無'}], value:String(cur.water)},

/* ---------- 點檢紀錄查詢 ---------- */
function adminRecordSection(div){
  const records = JSON.parse(localStorage.getItem(LS_RECORDS_KEY)||'[]');
  records.sort((a,b)=>((b.date||'')+' '+(b.time||'')).localeCompare((a.date||'')+' '+(a.time||'')));

  const from = window.adminRecordFrom||'';
  const to   = window.adminRecordTo||'';
  const filtered = records.filter(r=>{
    const d = r.date||'';
    if(from && d<from) return false;
    if(to   && d>to)   return false;
    return true;
  });

  div.innerHTML=`
    <div class="admin-section">
      <b style="font-size:1.13rem;">點檢紀錄查詢</b>
      <span style="margin-left:22px;">

        <tbody>${filtered.map(r=>`
          <tr>
            <td>${r.date||''}</td>
            <td>${r.time||''}</td>
            <td>${r.site||''}</td>
            <td>${r.vendor||''}</td>
            <td>${r.email||''}</td>
            <td>${r.stage||''}</td>
            <td style="text-align:left;word-break:break-all;">${r.content||''}</td>
          </tr>`).join('')}</tbody>
      </table>
    </div>
  `;
  setTimeout(()=>{
    document.getElementById('recordFilterBtn').onclick=()=>{
      window.adminRecordFrom=document.getElementById('recordFilterFrom').value;
      window.adminRecordTo=document.getElementById('recordFilterTo').value;
      adminRecordSection(div);
    };
    document.getElementById('resetFilterBtn').onclick=()=>{
      window.adminRecordFrom=''; window.adminRecordTo=''; adminRecordSection(div);
    };
  },10);
}

  }
};

/* ---------- 共用 Modal（支援 checkbox） ---------- */
function adminShowModal(title, fields, cb, opts){
  const mask=document.createElement('div'); mask.className='admin-modal-mask';
  const modal=document.createElement('div'); modal.className='admin-modal';
  modal.innerHTML = `<h2>${title}</h2><form id="modalForm"></form>
    <div style="text-align:right;">
      <button class="admin-btn" id="modalOK">確認</button>
      <button class="admin-btn danger" id="modalCancel">取消</button>
    </div>`;
  document.body.appendChild(mask);
  document.body.appendChild(modal);
  const form=modal.querySelector('#modalForm');

  // 若需要「連動」(選站點後自動篩選名稱) 的話，把 options 轉成 {value,text}
  const processed = fields.map(f=>{
    const copy={...f};
    if(f.type==='select' && Array.isArray(f.options)){
      copy.options = f.options.map(o=> typeof o==='object' ? o : {value:o, text:o});
    }
    return copy;
  });

  processed.forEach(f=>{
    const lbl=document.createElement('label');
    lbl.textContent=f.label;
    form.appendChild(lbl);
    if(f.type==='select'){
      const sel=document.createElement('select');
      sel.name=f.name;
      if(f.readonly) sel.disabled=true;
      f.options.forEach(opt=>{
        const optEl=document.createElement('option');
        optEl.value=opt.value;
        optEl.textContent=opt.text;
        if(String(f.value)==String(opt.value)) optEl.selected=true;
        sel.appendChild(optEl);
      });
      form.appendChild(sel);
    }else if(f.type==='checkbox'){
      const chk=document.createElement('input');
      chk.type='checkbox';
      chk.name=f.name;
      if(f.value) chk.checked=true;
      form.appendChild(chk);
    }else{
      const inp=document.createElement('input');
      inp.type=f.type;
      inp.name=f.name;
      if(f.readonly) inp.readOnly=true;
      inp.required=true;
      inp.value=f.value||'';
      if(f.min!==undefined) inp.min=f.min;
      if(f.max!==undefined) inp.max=f.max;
      form.appendChild(inp);
    }
    form.appendChild(document.createElement('br'));
  });

  // 連動功能（站點變更後自動更新名稱選項） － 只在新增/編輯 Vendor 時使用
  if(opts && opts.linked){
    const selSite = modal.querySelector('select[name="site"]');
    const selName = modal.querySelector('select[name="name"]');
    if(selSite && selName){
      selSite.onchange = function(){
        const siteVal = selSite.value;
        const names = opts.EXCEL_VENDORS.filter(v=>v.site===siteVal).map(v=>v.name);
        selName.innerHTML = names.map(n=>`<option value="${n}">${n}</option>`).join('');
      };
    }
  }

  modal.querySelector('#modalCancel').onclick=()=>{ modal.remove(); mask.remove(); };
  modal.querySelector('#modalOK').onclick=function(e){
    e.preventDefault();
    const data={};
    for(const f of processed){
      const input = form.querySelector(`[name="${f.name}"]`);
      if(f.type==='checkbox'){
        data[f.name]=input.checked;
        continue;
      }
      const val = input ? input.value.trim() : '';
      if(input && input.required && val===''){
        alert(`請填寫 ${f.label}`);
        return;
      }
      if(f.type==='number' && val!==''){
        const n = parseInt(val);
        if(isNaN(n) || (f.min!==undefined && n<f.min) || (f.max!==undefined && n>f.max)){
          alert(`請輸入有效的 ${f.label} (${f.min}-${f.max})`);
          return;
        }
        data[f.name]=n;
      }else{
        data[f.name]=val;
      }
    }
    cb(data);
    modal.remove(); mask.remove();
  };
}
