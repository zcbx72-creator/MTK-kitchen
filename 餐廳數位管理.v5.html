<title>餐廳每日自主點檢表（數位版）</title>
<style>
:root {
--main-color: #ff7700;
--accent-color: #f44336;
--bg-light: #f7f7f7;
--font-main: 'Noto Sans', 'Microsoft JhengHei', 'Arial', sans-serif;
--shadow: 0 2px 8px rgba(0,0,0,0.04);
}
body { font-family: var(--font-main); background: var(--bg-light); margin: 0; color: #222; }
header {background: #fff; box-shadow: var(--shadow); padding: 24px 0 16px 0; text-align: center;}
header h1 { font-size: 2rem; font-weight: 700; color: var(--main-color); margin: 0;}
.main-navbar,.sub-navbar{display:flex;justify-content:center;flex-wrap:wrap;background:#fff;padding:8px 8px 6px 8px;box-shadow:var(--shadow);gap:8px;}
.main-navbar{margin-top:2px;border-bottom:1.5px solid #ffe2c6;}
.main-navbar a,.sub-navbar a{text-decoration:none;color:#555;font-weight:500;padding:10px 18px;border-radius:15px;transition:background 0.2s,color 0.2s;cursor:pointer;background:#fff;border:none;font-size:1rem;}
.main-navbar a.active,.sub-navbar a.active{background:var(--main-color);color:#fff;font-weight:800;box-shadow:0 2px 7px #fffbf0;}
main{max-width:575px;margin:32px auto 24px auto;background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:24px 16px 32px 16px;position:relative;min-height:320px;}
.form-group{margin-bottom:18px;display:flex;flex-direction:column;}
label{font-weight:600;margin-bottom:7px;}
input,select,textarea{font-family:var(--font-main);font-size:1rem;padding:8px;border:1px solid #ddd;border-radius:6px;background:#fafafa;transition:border 0.2s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--main-color);}
.notice{font-weight:700;color:var(--accent-color);background:#fff3e0;padding:12px 16px;border-radius:8px;margin-bottom:16px;text-align:center;}
.explain-box{background:#f8fafc;border-left:4px solid var(--main-color);color:#334;padding:13px 14px 13px 14px;margin-bottom:15px;border-radius:8px;font-size:0.97rem;line-height:1.7;}
.explain-box ul{margin:0;padding-left:19px;}
.highlight-orange{color:#ff7700!important;font-weight:600;}
.data-table{width:100%;border-collapse:collapse;margin-bottom:20px;table-layout:fixed;background:#fff;}
.data-table th,.data-table td{border:1px solid #eee;padding:8px 4px;text-align:center;font-size:0.97rem;word-break:break-all;}
.data-table th{background:#f5f5f5;font-weight:600;color:#555;}
.data-table td input,.data-table td select{width:90%;min-width:0;box-sizing:border-box;margin:0;}
.signature-group{margin-top:12px;display:flex;flex-direction:column;gap:7px;}
.cta-btn,.tab-done-btn{background:var(--main-color);color:#fff;font-weight:700;font-size:1.13rem;border:none;border-radius:13px;padding:14px 0;margin-top:18px;cursor:pointer;width:100%;box-shadow:0 2px 8px rgba(255,119,0,0.13);transition:background 0.2s,box-shadow 0.2s;}
.cta-btn:active,.cta-btn:hover,.tab-done-btn:hover{background:#d66400;box-shadow:0 4px 16px rgba(255,119,0,0.17);}
.done-indicator{display:inline-block;background:#65bd21;color:#fff;border-radius:100px;font-size:14px;padding:0 10px;margin-left:9px;vertical-align:2px;font-weight:bold;}
.sub-navbar a.done-sub{border:2px solid #20bb72 !important;background:#e9ffe0;color:#137a38 !important;}
footer{margin:0 auto;text-align:right;padding:16px 20px;color:#bbb;font-size:1rem;position:relative;}
.footer-logo{display:inline-block;width:72px;height:28px;background:url('https://www.mediatek.com/-/media/mediatek/corp/mediatek_logo.png') no-repeat center/contain;vertical-align:middle;opacity:0.6;}
@media (max-width: 700px) {
main{max-width:99vw;padding:12px 1vw 19px;border-radius:10px;margin:7px auto;}
.main-navbar,.sub-navbar{flex-direction:column;gap:6px;padding:8px 1vw;}
.main-navbar a,.sub-navbar a{padding:10px 12px;border-radius:12px;font-size:0.98rem;}
.explain-box{font-size:0.92rem;}
.data-table th,.data-table td{font-size:0.89rem;padding:6px 2px;}
.cta-btn,.tab-done-btn{font-size:1rem;padding:12px 0;}
footer{padding:9px 9px;font-size:0.93rem;}
.footer-logo{width:52px;height:19px;}
}
.mail-content-box{background:#fffbe7;color:#222;border-radius:8px;padding:14px 10px;margin:14px 0;font-size:0.96rem;border:1px solid #ffb600;white-space:pre-wrap;display:none;}
/* 管理後台 RWD 與樣式 */
#adminPanel { max-height:90vh; overflow:auto;}
@media (max-width:600px) {
#adminPanel { max-width:98vw; margin:10px auto 0; padding:14px 1vw;}
}
.admin-section { margin-bottom:17px;padding-bottom:10px;border-bottom:1px solid #eee;}
.admin-table { width:100%;border-collapse:collapse;background:#fff;}
.admin-table th,.admin-table td { border:1px solid #eee;padding:7px 3px;font-size:0.95rem;text-align:center;}
.admin-table th {background:#ffe1d7;}
.admin-btn { background:#ff7700;color:#fff;border:none;border-radius:8px;padding:6px 12px; font-weight:700; cursor:pointer;margin-right:10px;}
.admin-btn.danger { background:#f44336;}
.admin-btn.sm {font-size:0.89rem;padding:4px 6px;}
.admin-modal-mask { position:fixed;top:0;left:0;width:100vw;height:100vh; background:rgba(35,35,35,0.29);z-index:12000;}
.admin-modal{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
min-width:280px;max-width:90vw;
background:#fff;border-radius:13px;box-shadow:0 8px 28px rgba(55,55,55,0.14);
z-index:12001;padding:26px 26px;font-size:1rem;
}
.admin-modal h2{margin-top:0; font-weight:700;font-size:1.17rem;}
.admin-modal input, .admin-modal select {margin-bottom:8px; width:100%; padding:8px;}
.admin-modal label{font-weight:600;}
.admin-table tr.selected { background:#ffe3b7;}
#adminLoginPanel input{font-size:1.08rem;}
<link href="https://fonts.googleapis.com/css?family=Noto+Sans:400,700&display=swap" rel="stylesheet">
</style>
</head>

function saveSubForm(ev, mainKey, subKey) {
    ev.preventDefault();
    let wrap = document.getElementById('tabContent');
    let fail = false;
    let collectedData = {}; // 存放從頁面實際渲染的輸入框中收集到的數據 (包括 disabled/empty 則為 'NA')
    let mailFields = [];    // 存放最終用於生成郵件內容的 [ {title, value}, ... ] 格式

    // 1. 從頁面上實際渲染的輸入框收集數據，並進行基本驗證
    let renderedInputs = Array.from(wrap.querySelectorAll('input,select,textarea'));
    for (const inputEl of renderedInputs) {
        let req = inputEl.required, val = inputEl.value;
        // 驗證必填欄位 (如果不是禁用狀態且值為空或「請選擇」)
        if (req && !inputEl.disabled && (val === '' || val === '請選擇')) {
            fail = true;
            break;
        }
        if (inputEl.name) {
            // 儲存收集到的值，如果被禁用或為空/「請選擇」，則存為 'NA'
            collectedData[inputEl.name] = (inputEl.disabled || val === '' || val === '請選擇') ? 'NA' : val;
        }
    }
    if (fail) { alert('請填寫所有欄位'); return; }

    // 取得廠商配置，用於判斷哪些設備不存在
    const currentVendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY) || 'null') || [];
    const selectedSite = document.getElementById('site').value;
    const selectedVendorName = document.getElementById('vendor').value;
    const selectedVendorConfig = currentVendors.find(v => v.site === selectedSite && v.name === selectedVendorName) || {
        refrigeratorA: 0, refrigeratorB: 0, constantTemp: false, storageRoom: false
    };

    // 2. 根據子分頁類型和廠商配置，構建完整的郵件內容項目
    if (subKey === 'cold') {
        // 點檢員簽名 (這個欄位總是會被渲染)
        mailFields.push({ title: '點檢員簽名',value: collectedData['signature'] || 'NA' });

        // 常溫冰箱
        if (selectedVendorConfig.constantTemp) {
            mailFields.push({ title: '常溫1冷藏溫度',value: collectedData['constant1_r'] || 'NA' });
        } else {
            mailFields.push({ title: '常溫1冷藏溫度',value: 'NA (無此設備)' });
        }

        const maxA = selectedVendorConfig.refrigeratorA || 0;
        const maxB = selectedVendorConfig.refrigeratorB || 0;

        // 遍歷所有可能的 A1-A7, B1-B7 冰箱及對應備註
        for (let i = 1; i <= 7; i++) { // 假設最多有 7 個 A 系列和 7 個 B 系列冰箱
            // A 系列冷藏
            if (i <= maxA) {
                mailFields.push({ title: `A${i}冷藏溫度`,value: collectedData[`A${i}_r`] || 'NA' });
            } else {
                mailFields.push({ title: `A${i}冷藏溫度`,value: 'NA (無此設備)' });
            }

            // B 系列冷凍
            if (i <= maxB) {
                mailFields.push({ title: `B${i}冷凍溫度`,value: collectedData[`B${i}_f`] || 'NA' });
            } else {
                mailFields.push({ title: `B${i}冷凍溫度`,value: 'NA (無此設備)' });
            }

            // 異常備註 (A/B 冰箱共用備註)
            // 如果 A 或 B 系列的該編號設備有任何一個存在，則備註欄位會被渲染，用其收集到的值。
            // 否則 (A 和 B 的該編號設備都不存在)，則該備註也標記為「NA (無此設備)」。
            if (i <= maxA || i <= maxB) {
                mailFields.push({ title: `A${i}/B${i}異常備註`,value: collectedData[`A${i}_B${i}_note`] || 'NA' });
            } else {
                mailFields.push({ title: `A${i}/B${i}異常備註`,value: 'NA (無此設備)' });
            }
        }
    } else if (subKey === 'storage') {
        // 庫房溫度記錄
        mailFields.push({ title: '點檢員簽名', value: collectedData['signature'] || 'NA' });
        if (selectedVendorConfig.storageRoom) {
            mailFields.push({ title: '溫度(°C)',value: collectedData['temp'] || 'NA' });
            mailFields.push({ title: '濕度(%)',value: collectedData['humi'] || 'NA' });
            mailFields.push({ title: '異常處理/備註',value: collectedData['comment'] || 'NA' });
        } else {
            mailFields.push({ title: '溫度(°C)',value: 'NA (無此設備)' });
            mailFields.push({ title: '濕度(%)',value: 'NA (無此設備)' });
            mailFields.push({ title: '異常處理/備註',value: 'NA (無此設備)' });
        }
    } else {
        // 對於其他子分頁 ('vendor', 'oil', 'water', 'safety')
        // 這些分頁的所有字段都會被渲染 (雖然有些可能會被禁用，這在 collectedData 中已處理為 'NA')
        // 所以直接將 collectedData 中的項目轉換為郵件格式。
        for (const inputEl of renderedInputs) {
            const title = inputEl.getAttribute('data-title');
            if (title) { // 確保有 data-title 才加入郵件內容
                mailFields.push({ title: title, value: collectedData[inputEl.name] || 'NA' });
            }
        }
    }

    // 3. 將 mailFields 轉換成最終的郵件文字字串
    const mailText = mailFields.map(item => `${item.title}，${item.value}`).join('；\n');

    // 儲存處理後的數據和郵件文字
    // 注意：`data` 字段會是從頁面渲染元素收集到的，而 `mailText` 則是完整包含所有 NA (無此設備) 的版本。
    formData[mainKey][subKey] = {
        data: collectedData,
        mailText: mailText
    };

    // 更新子導航列的完成狀態
    renderSubNav(mainKey, subKey);

    // 尋找下一個未完成的子項目
    let schTabs = SCHEDULES.find(s => s.key === mainKey).subTabs;
    let curIdx = schTabs.findIndex(t => t.key === subKey);
    let nextSubTabFound = false;

    for (let i = curIdx + 1; i < schTabs.length; i++) {
        const nextSubKey = schTabs[i].key;

        // 特殊處理「庫房溫度」頁面：如果廠商沒有庫房，則自動標記為已完成 (NA)
        if (nextSubKey === 'storage' && !selectedVendorConfig.storageRoom) {
            // 如果此子項目尚未被標記為完成 (NA)，則設定其為 NA (使用和郵件一樣的邏輯)
            if (!formData[mainKey][nextSubKey]) {
                const storageMailFields = [];
                storageMailFields.push({ title: '點檢員簽名',value: 'NA' }); // 簽名也為 NA
                storageMailFields.push({ title: '溫度(°C)',value: 'NA (無此設備)' });
                storageMailFields.push({ title: '濕度(%)',value: 'NA (無此設備)' });
                storageMailFields.push({ title: '異常處理/備註',value: 'NA (無此設備)' });

                formData[mainKey][nextSubKey] = {
                    // data 部分也填充 NA (無此設備) 相關信息
                    data: { temp: 'NA (無此設備)', humi: 'NA (無此設備)', comment: 'NA (無此設備)', signature: 'NA' },
                    mailText: storageMailFields.map(item => `${item.title}，${item.value}`).join('；\n')
                };
            }
            renderSubNav(mainKey, nextSubKey); // 更新 NA 項目的 UI
            continue; // 跳過此項，繼續尋找下一個
        }

        // 對於其他未完成的項目 (或是有庫房的 storage 項目)，則切換過去
        if (!formData[mainKey][nextSubKey]) {
            switchSubTab(nextSubKey);
            nextSubTabFound = true;
            break;
        }
    }

    if (!nextSubTabFound) {
        alert("本時段所有檢查項目已完成!");
    }
}

}
// 登入驗證流程
let adminLoginUser = null;
function showAdminLogin() {
document.getElementById('adminLoginPanel').innerHTML = `
<div style="text-align:center;margin-bottom:22px;">
<b style="font-size:1.12rem;color:#d66400;">管理員登入</b>
</div>
<form id="adminLoginForm">
<label>帳號</label>
<input id="adminUser" type="text" autocomplete="username" required placeholder="admin"><br>
<label>密碼</label>
<input id="adminPwd" type="password" autocomplete="current-password" required placeholder="•••••"><br>
<button type="submit" class="admin-btn" style="width:100%;">登入</button>
</form>
<div id="adminLoginMsg"></div>
`;
document.getElementById('adminContentPanel').innerHTML = '';
document.getElementById('adminLoginForm').onsubmit = function(e){
e.preventDefault();
let u=document.getElementById('adminUser').value.trim();
let p=document.getElementById('adminPwd').value.trim();
let admins = JSON.parse(localStorage.getItem(LS_ADMIN_KEY)||'null') || ADMIN_DEFAULT;
let ok = admins.some(a=>a.user===u&&a.pwd===p);
if(ok) {
adminLoginUser = u;
document.getElementById('adminLoginPanel').innerHTML = '';
showAdminContent();
} else {
document.getElementById('adminLoginMsg').innerHTML = '<span style="color:#f44336;">帳號或密碼錯誤</span>';
}
};
}
// 主內容選單
function showAdminContent() {
const panel = document.getElementById('adminContentPanel');
panel.innerHTML = `
<div style="text-align:right;margin-bottom:6px;">

window.logoutAdmin = function(){

window.adminNav = function(section){

if(section==='vendor') adminVendorSection(secCont);
else if(section==='record') adminRecordSection(secCont);
else if(section==='admin') adminAccountSection(secCont);

`<tr>

window.newVendor = function() {
let vendors = JSON.parse(localStorage.getItem("vendors")||'null')||[];
let allSites = [...new Set(EXCEL_VENDORS.map(v=>v.site))];
let defaultSite = allSites[0];
let nameList = site => EXCEL_VENDORS.filter(v=>v.site===site).map(v=>v.name);
let siteOptions = allSites;
let nameOptions = nameList(defaultSite);
adminShowModal('新增廠商', [
{label:'辦公區', name:'site', type:'select', options: siteOptions},
{label:'廠商名稱', name:'name', type:'select', options: nameOptions},
{label:'廠商 EMAIL（如有多位，請用分號「;」分隔）', name:'email', type:'email'}
], (data)=>{
// 新增廠商時，初始化設備數量 (預設為0或false，避免未知配置導致錯誤)
vendors.push({
...data,
refrigeratorA: 0,
refrigeratorB: 0,
constantTemp: false,
storageRoom: false
});
localStorage.setItem("vendors",JSON.stringify(vendors));
adminNav('vendor');
syncVendorMenus();
}, {linked:true, EXCEL_VENDORS});
}

window.editVendor = function(i){
let vendors = JSON.parse(localStorage.getItem("vendors")||'null')||[];
let v = vendors[i];
let allSites = [...new Set(EXCEL_VENDORS.map(v=>v.site))];
let nameList = site => EXCEL_VENDORS.filter(vv=>vv.site===site).map(vv=>vv.name);
let siteOptions = allSites.includes(v.site) ? allSites : [...allSites,v.site];
let nameOptions = nameList(v.site);
if (!nameOptions.includes(v.name)) nameOptions.push(v.name);
adminShowModal('編輯廠商', [
{label:'辦公區', name:'site', type:'select', options: siteOptions, value:v.site},
{label:'廠商名稱', name:'name', type:'select', options: nameOptions, value:v.name},
{label:'廠商 EMAIL（如有多位，請用分號「;」分隔）', name:'email', type:'email', value:v.email}
], (data)=>{
// 更新廠商基本資料，保留設備數量配置
vendors[i] = {
...vendors[i], // 保留舊的設備數量等資訊
site: data.site,
name: data.name,
email: data.email
};
localStorage.setItem("vendors",JSON.stringify(vendors));
adminNav('vendor');
syncVendorMenus();
}, {linked:true, EXCEL_VENDORS});
}
window.delVendor=function(i){

let vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY)||'null')||[];
vendors.splice(i,1);

adminNav('vendor');
syncVendorMenus();
}
}

window.editEquipmentConfig = function(index) {
let vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY) || 'null') || [];

// 確保有預設值，避免 undefined
vendor.refrigeratorA = vendor.refrigeratorA ?? 0;

vendor.storageRoom = vendor.storageRoom ?? false;

adminShowModal('編輯設備數量', [
{ label: '辦公區', name: 'site', type: 'text', value: vendor.site, readonly: true },
{ label: '廠商名稱', name: 'name', type: 'text', value: vendor.name, readonly: true },
{ label: '冷藏冰箱(A)數量', name: 'refrigeratorA', type: 'number', value: vendor.refrigeratorA, min: 0, max: 20 },
{ label: '冷凍冰箱(B)數量', name: 'refrigeratorB', type: 'number', value: vendor.refrigeratorB, min: 0, max: 20 },
{ label: '是否有常溫冰箱', name: 'constantTemp', type: 'select', options: [{ value: 'true', text: '有' }, { value: 'false', text: '無' }], value: vendor.constantTemp.toString() },

vendors[index].refrigeratorB = parseInt(data.refrigeratorB);
vendors[index].constantTemp = data.constantTemp === 'true';
vendors[index].storageRoom = data.storageRoom === 'true';

adminNav('equipment'); // 重新渲染設備數量頁面

});

function adminRecordSection(div){
let records = JSON.parse(localStorage.getItem(LS_RECORDS_KEY)||'null')||[];
// 日期+時間倒序排序
records.sort((a, b) => {
// 日期格式: yyyy-mm-dd，時間格式: hh:mm:ss
let t1 = (a.date || '') + ' ' + (a.time || '');
let t2 = (b.date || '') + ' ' + (b.time || '');
// 新→舊排序
return t2.localeCompare(t1);
});

// 區間選擇用，預設顯示全部
let from = window.adminRecordFrom || '';
let to = window.adminRecordTo || '';
let showRecords = records.filter(r => {
let d = r.date || '';
if(from && d < from) return false;
if(to && d > to) return false;
return true;
});

div.innerHTML = `
<div class="admin-section">
<b style="font-size:1.13rem;">點檢紀錄查詢</b>
<span style="margin-left:22px;">
查詢區間：
<input type="date" id="recordFilterFrom" value="${from}" style="font-size:1rem;">
~
<input type="date" id="recordFilterTo" value="${to}" style="font-size:1rem;">
<button class="admin-btn sm" id="recordFilterBtn">查詢</button>
<button class="admin-btn sm" id="resetFilterBtn">重設</button>
</span>
<table class="admin-table" style="margin-top:9px;">
<thead>
<tr><th>日期</th><th>時間</th><th>區域</th><th>廠商</th><th>EMAIL</th><th>時段/子項</th><th>內容</th></tr>
</thead>
<tbody>
${showRecords.map(r=>
`<tr>
<td>${r.date||''}</td>
<td>${r.time||''}</td>
<td>${r.site||''}</td>
<td>${r.vendor||''}</td>
<td>${r.email||''}</td>
<td>${r.stage||''}</td>
<td style="text-align:left;word-break:break-all;">${r.content||''}</td>
</tr>`
).join('')}
</tbody>
</table>
</div>
`;

// 綁定查詢按鈕功能
setTimeout(()=>{
document.getElementById('recordFilterBtn').onclick = function(){
window.adminRecordFrom = document.getElementById('recordFilterFrom').value;
window.adminRecordTo = document.getElementById('recordFilterTo').value;
adminRecordSection(div);
};
document.getElementById('resetFilterBtn').onclick = function(){
window.adminRecordFrom = '';
window.adminRecordTo = '';
adminRecordSection(div);
};
}, 10);
}

function adminShowModal(title, fields, cb, opts){
let mask=document.createElement('div'); mask.className='admin-modal-mask';
let modal=document.createElement('div'); modal.className='admin-modal';
modal.innerHTML = `<h2>${title}</h2>
<form id="modalForm"></form>
<div style="text-align:right;">
<button class="admin-btn" id="modalOK">確認</button>
<button class="admin-btn danger" id="modalCancel">取消</button>
</div>
`;
let form=modal.querySelector('#modalForm');

let processedFields = [...fields]; // 複製一份，避免修改原始 `fields`

// 處理連動下拉選單 (用於廠商新增/編輯)
if(opts && opts.linked) {
let allSites = [...new Set(opts.EXCEL_VENDORS.map(v=>v.site))];
let siteField = processedFields.find(f => f.name === 'site');
let nameField = processedFields.find(f => f.name === 'name');

if (siteField) {
siteField.options = allSites.map(s => ({ value: s, text: s }));
}
if (nameField && siteField) {
let defaultSite = siteField.value || allSites[0];
let defaultNames = opts.EXCEL_VENDORS.filter(v => v.site === defaultSite).map(v => v.name);
nameField.options = defaultNames.map(n => ({ value: n, text: n }));
}
}

processedFields.forEach(f=>{
let inputHtml = '';
form.innerHTML+=`<label>${f.label}</label>`;
if(f.type==='select'){
inputHtml = `<select name="${f.name}" ${f.readonly ? 'disabled' : ''} required>`;
f.options.forEach(opt => {
let optValue = typeof opt === 'object' ? opt.value : opt;
let optText = typeof opt === 'object' ? opt.text : opt;
inputHtml += `<option value="${optValue}" ${f.value == optValue ? 'selected' : ''}>${optText}</option>`; // 使用 == 允許 'true' == true
});
inputHtml += `</select>`;
} else {
inputHtml = `<input name="${f.name}" type="${f.type}" ${f.readonly ? 'readonly' : ''} required value="${f.value||''}"`;
if (f.min !== undefined) inputHtml += ` min="${f.min}"`;
if (f.max !== undefined) inputHtml += ` max="${f.max}"`;
inputHtml += `>`;
}
form.innerHTML += inputHtml;
});
document.body.appendChild(mask);document.body.appendChild(modal);

// 動態連動事件綁定 (針對廠商新增/編輯頁面的站點與廠商名稱)
if(opts && opts.linked) {
let selSite = modal.querySelector('select[name="site"]');
let selName = modal.querySelector('select[name="name"]');
if (selSite && selName) {
selSite.onchange = function(){
let site = selSite.value;
let names = opts.EXCEL_VENDORS.filter(v=>v.site===site).map(v=>v.name);
selName.innerHTML = names.map(x=>`<option value="${x}">${x}</option>`).join('');
};
}
}

modal.querySelector('#modalCancel').onclick = ()=>{ modal.remove();mask.remove();};
modal.querySelector('#modalOK').onclick=function(e){
e.preventDefault();
let data={};
let allFieldsValid = true;
for(let f of processedFields){
let inputElement = form.querySelector(`[name="${f.name}"]`);
// 對於 readonly 的欄位，不進行驗證，但要取值
if (f.readonly && inputElement) {
data[f.name] = inputElement.value.trim();
continue; // 跳過後續驗證
}

let v = inputElement ? inputElement.value.trim() : '';

if (f.type === 'number') {
if (inputElement.required && v === '') {
allFieldsValid = false;
alert(`請填寫${f.label}欄位`);
break;
}
if (v !== '') {
let numVal = parseInt(v);
if (isNaN(numVal) || (f.min !== undefined && numVal < f.min) || (f.max !== undefined && numVal > f.max)) {
alert(`請輸入有效的${f.label}值 (${f.min}-${f.max})`);
allFieldsValid = false;
break;
}
}
} else if (inputElement.required && v==='') {
alert(`請填寫${f.label}欄位`);
allFieldsValid = false;
break;
}
data[f.name]=v;
}
if(!allFieldsValid) { return; } // 如果有驗證失敗，直接返回

cb(data);
modal.remove();mask.remove();
};
}

window.restoreVendorsDefault = function() {
