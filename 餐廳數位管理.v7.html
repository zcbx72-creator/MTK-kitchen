<title>餐廳每日自主點檢表（數位版）</title>
<style>
:root{
  --main-color:#ff7700;
  --accent-color:#f44336;
  --bg-light:#f7f7f7;
  --font-main:'Noto Sans','Microsoft JhengHei','Arial',sans-serif;
  --shadow:0 2px 8px rgba(0,0,0,0.04);
}
body{font-family:var(--font-main);background:var(--bg-light);margin:0;color:#222;}
header{background:#fff;box-shadow:var(--shadow);padding:24px 0 16px 0;text-align:center;}
header h1{font-size:2rem;font-weight:700;color:var(--main-color);margin:0;}
.main-navbar,.sub-navbar{display:flex;justify-content:center;flex-wrap:wrap;background:#fff;padding:8px 8px 6px 8px;box-shadow:var(--shadow);gap:8px;}
.main-navbar{margin-top:2px;border-bottom:1.5px solid #ffe2c6;}
.main-navbar a,.sub-navbar a{text-decoration:none;color:#555;font-weight:500;padding:10px 18px;border-radius:15px;transition:background .2s,color .2s;cursor:pointer;background:#fff;border:none;font-size:1rem;}
.main-navbar a.active,.sub-navbar a.active{background:var(--main-color);color:#fff;font-weight:800;box-shadow:0 2px 7px #fffbf0;}
main{max-width:575px;margin:32px auto 24px auto;background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:24px 16px 32px 16px;position:relative;min-height:320px;}
.form-group{margin-bottom:18px;display:flex;flex-direction:column;}
label{font-weight:600;margin-bottom:7px;}
input,select,textarea{font-family:var(--font-main);font-size:1rem;padding:8px;border:1px solid #ddd;border-radius:6px;background:#fafafa;transition:border .2s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--main-color);}
.notice{font-weight:700;color:var(--accent-color);background:#fff3e0;padding:12px 16px;border-radius:8px;margin-bottom:16px;text-align:center;}
.explain-box{background:#f8fafc;border-left:4px solid var(--main-color);color:#334;padding:13px 14px;margin-bottom:15px;border-radius:8px;font-size:.97rem;line-height:1.7;}
.explain-box ul{margin:0;padding-left:19px;}
.highlight-orange{color:#ff7700!important;font-weight:600;}
.data-table{width:100%;border-collapse:collapse;margin-bottom:20px;table-layout:fixed;background:#fff;}
.data-table th,.data-table td{border:1px solid #eee;padding:8px 4px;text-align:center;font-size:.97rem;word-break:break-all;}
.data-table th{background:#f5f5f5;font-weight:600;color:#555;}
.data-table td input,.data-table td select{width:90%;min-width:0;box-sizing:border-box;margin:0;}
.signature-group{margin-top:12px;display:flex;flex-direction:column;gap:7px;}
.cta-btn,.tab-done-btn{background:var(--main-color);color:#fff;font-weight:700;font-size:1.13rem;border:none;border-radius:13px;padding:14px 0;margin-top:18px;cursor:pointer;width:100%;box-shadow:0 2px 8px rgba(255,119,0,.13);transition:background .2s,box-shadow .2s;}
.cta-btn:active,.cta-btn:hover,.tab-done-btn:hover{background:#d66400;box-shadow:0 4px 16px rgba(255,119,0,.17);}
.done-indicator{display:inline-block;background:#65bd21;color:#fff;border-radius:100px;font-size:14px;padding:0 10px;margin-left:9px;vertical-align:2px;font-weight:bold;}
.sub-navbar a.done-sub{border:2px solid #20bb72 !important;background:#e9ffe0;color:#137a38 !important;}
footer{margin:0 auto;text-align:right;padding:16px 20px;color:#bbb;font-size:1rem;position:relative;}
.footer-logo{display:inline-block;width:72px;height:28px;background:url('https://www.mediatek.com/-/media/mediatek/corp/mediatek_logo.png') no-repeat center/contain;vertical-align:middle;opacity:.6;}

@media (max-width:700px){
  main{max-width:99vw;padding:12px 1vw 19px;border-radius:10px;margin:7px auto;}
  .main-navbar,.sub-navbar{flex-direction:column;gap:6px;padding:8px 1vw;}
  .main-navbar a,.sub-navbar a{padding:10px 12px;border-radius:12px;font-size:.98rem;}
  .explain-box{font-size:.92rem;}
  .data-table th,.data-table td{font-size:.89rem;padding:6px 2px;}
  .cta-btn,.tab-done-btn{font-size:1rem;padding:12px 0;}
  footer{padding:9px 9px;font-size:.93rem;}
  .footer-logo{width:52px;height:19px;}
}

.mail-content-box{background:#fffbe7;color:#222;border-radius:8px;padding:14px 10px;margin:14px 0;font-size:.96rem;border:1px solid #ffb600;white-space:pre-wrap;display:none;}

/* 管理後台 RWD 與樣式 */
#adminPanel{max-height:90vh;overflow:auto;}
@media (max-width:600px){
  #adminPanel{max-width:98vw;margin:10px auto 0;padding:14px 1vw;}
}
.admin-section{margin-bottom:17px;padding-bottom:10px;border-bottom:1px solid #eee;}
.admin-table{width:100%;border-collapse:collapse;background:#fff;}
.admin-table th,.admin-table td{border:1px solid #eee;padding:7px 3px;font-size:.95rem;text-align:center;}
.admin-table th{background:#ffe1d7;}
.admin-btn{background:#ff7700;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer;margin-right:10px;}
.admin-btn.danger{background:#f44336;}
.admin-btn.sm{font-size:.89rem;padding:4px 6px;}
.admin-modal-mask{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(35,35,35,.29);z-index:12000;}
.admin-modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  min-width:280px;max-width:90vw;
  background:#fff;border-radius:13px;box-shadow:0 8px 28px rgba(55,55,55,.14);
  z-index:12001;padding:26px 26px;font-size:1rem;
  max-height:85vh; overflow:auto; /* 讓編輯頁有上下卷軸 */
}
.admin-modal h2{margin-top:0;font-weight:700;font-size:1.17rem;}
.admin-modal input,.admin-modal select{margin-bottom:8px;width:100%;padding:8px;}
.admin-modal label{font-weight:600;}
.admin-table tr.selected{background:#ffe3b7;}
#adminLoginPanel input{font-size:1.08rem;}

function getVendorFormsConfig(site, name){
  let forms = JSON.parse(localStorage.getItem(LS_FORMS_KEY) || '[]');
  return forms.find(f => f.site===site && f.name===name) || null;
}
function isSubTabEnabledByAdmin(mainKey, subKey, formsCfg){
  if(mainKey==='penalty') return true;
  if(!formsCfg) return true;
  if(subKey==='cold') return !!formsCfg.cold;
  if(subKey==='vendor') return !!formsCfg.vendor;
  if(subKey==='oil') return !!formsCfg.oil;
  if(subKey==='storage') return !!formsCfg.storage;
  if(subKey==='water') return !!formsCfg.water;
  if(subKey==='safety') return !!formsCfg.safety;
  return true;
}

function buildNAFormMailText(subKey, mainKey){
  const join = arr => arr.map(x=>`${x.t}，${x.v}`).join('；\n');
  if(subKey==='cold'){
    const a=[];
    a.push({t:'點檢員簽名', v:'NA'});
    a.push({t:'常溫1冷藏溫度', v:'NA (無此設備)'});
    for(let i=1;i<=7;i++){
      a.push({t:`A${i}冷藏溫度`, v:'NA (無此設備)'});
      a.push({t:`B${i}冷凍溫度`, v:'NA (無此設備)'});
      a.push({t:`A${i}/B${i}異常備註`, v:'NA (無此設備)'});
    }
    return join(a);
  }
  if(subKey==='vendor'){
    const items = (mainKey==='early') ? VENDOR_CHECK_ITEMS_EARLY : VENDOR_CHECK_ITEMS_NIGHT;
    const a = items.map(t=>({t, v:'NA (無此設備)'}));
    a.push({t:'點檢員簽名', v:'NA'});
    return join(a);
  }
  if(subKey==='oil'){
    const a=[
      {t:'今天將使用油炸油', v:'NA (無此設備)'},
      {t:'油顏色太深', v:'NA (無此設備)'},
      {t:'油品泡沫', v:'NA (無此設備)'},
      {t:'油炸油發煙', v:'NA (無此設備)'},
      {t:'酸價檢測（mgKOH/g）', v:'NA (無此設備)'},
      {t:'今日是否更換全新油炸油', v:'NA (無此設備)'},
      {t:'點檢員簽名', v:'NA'}
    ];
    return join(a);
  }
  if(subKey==='storage'){
    const a=[
      {t:'點檢員簽名', v:'NA'},
      {t:'溫度(°C)', v:'NA (無此設備)'},
      {t:'濕度(%)', v:'NA (無此設備)'},
      {t:'異常處理/備註', v:'NA (無此設備)'}
    ];
    return join(a);
  }
  if(subKey==='water'){
    const a=[
      {t:'抄表度數', v:'NA (無此設備)'},
      {t:'異常/備註', v:'NA (無此設備)'},
      {t:'點檢員簽名', v:'NA'}
    ];
    return join(a);
  }
  if(subKey==='safety'){
    const items=[
      "爐火是否確實關閉","瓦斯偵測器是否正常","瓦斯遮斷系統是否正常","廚房有無瓦斯洩漏異味",
      "瓦斯分盤閥門是否確實關閉","滅火器壓力、外觀是否正常","瓦斯總筏是否確實關閉"
    ];
    const a=items.map(t=>({t, v:'NA (無此設備)'}));
    a.push({t:'點檢員簽名', v:'NA'});
    return join(a);
  }
  return '';
}

function autoMarkDisabledSubTabsAsDone(mainKey){
  let site = document.getElementById('site').value;
  let vendor = document.getElementById('vendor').value;
  if(!site || !vendor) return;

  let formsCfg = getVendorFormsConfig(site, vendor);
  if(!formsCfg) return;

  let sch = SCHEDULES.find(s=>s.key===mainKey);
  sch.subTabs.forEach(st=>{
    if(!isSubTabEnabledByAdmin(mainKey, st.key, formsCfg)){
      if(!formData[mainKey][st.key]){
        formData[mainKey][st.key] = { data:{}, mailText: buildNAFormMailText(st.key, mainKey) };
      }
    }
  });
}

function renderMainNav(){
  const wrap = document.getElementById('main-navbar');
  wrap.innerHTML = SCHEDULES.map((s,i)=>
    `<a href="#" class="main-tab${i===0?' active':''}" data-idx="${i}" data-main="${s.key}"
      onclick="switchMainTab('${s.key}');return false;">${s.label}</a>`
  ).join('');
}

function renderSubNav(mainKey, curSubKey){
  const sched = SCHEDULES.find(s=>s.key===mainKey);
  let html='';

  const selectedSite = document.getElementById('site').value;
  const selectedVendor = document.getElementById('vendor').value;
  const formsCfg = (selectedSite && selectedVendor) ? getVendorFormsConfig(selectedSite, selectedVendor) : null;

  const visibleSubTabs = (sched?.subTabs || []).filter(st => isSubTabEnabledByAdmin(mainKey, st.key, formsCfg));

  // 若當前子頁被關掉，跳到第一個可見子頁
  if(visibleSubTabs.length>0 && !visibleSubTabs.some(x=>x.key===curSubKey)){
    currentSubTab = visibleSubTabs[0].key;
    curSubKey = currentSubTab;
  }

  if(sched && visibleSubTabs.length>0){
    html = visibleSubTabs.map(s =>
      `<a href="#"
        class="sub-tab${(curSubKey===s.key)?' active':''} ${formData[mainKey][s.key] ? 'done-sub' : ''}"
        data-sub="${s.key}"
        onclick="switchSubTab('${s.key}');return false;">
        ${s.label}${formData[mainKey][s.key] ? '<span class="done-indicator">✔</span>' : ''}
      </a>`
    ).join('');
  }

  document.getElementById('sub-navbar').innerHTML = html;
}

function switchMainTab(mainKey){
  currentMainTab = mainKey;

  // 先把被後台關掉的項目自動視為完成（含 mailText）
  autoMarkDisabledSubTabsAsDone(mainKey);

  let idx = SCHEDULES.findIndex(s=>s.key===mainKey);
  document.querySelectorAll('.main-navbar a').forEach((el,i)=>{
    if(i===idx) el.classList.add('active'); else el.classList.remove('active');
  });

  // 找第一個可見 subtab
  const selectedSite = document.getElementById('site').value;
  const selectedVendor = document.getElementById('vendor').value;
  const formsCfg = (selectedSite && selectedVendor) ? getVendorFormsConfig(selectedSite, selectedVendor) : null;
  const visibleSubTabs = SCHEDULES[idx].subTabs.filter(st => isSubTabEnabledByAdmin(mainKey, st.key, formsCfg));

  const subFirst = (visibleSubTabs.length>0) ? visibleSubTabs[0].key : SCHEDULES[idx].subTabs[0].key;
  currentSubTab = subFirst;

  renderSubNav(mainKey, subFirst);
  switchSubTab(subFirst);
}

function switchSubTab(subKey){
  currentSubTab = subKey;
  document.querySelectorAll('.sub-navbar a').forEach(e=>{
    if(e.getAttribute('data-sub')===subKey) e.classList.add('active');
    else e.classList.remove('active');
  });
  renderTabPage(currentMainTab, currentSubTab);
}

/* ==============================
   完成本項目：mailText 生成（維持原格式）
============================== */
function saveSubForm(ev, mainKey, subKey){
  ev.preventDefault();
  let wrap=document.getElementById('tabContent');
  let fail=false;
  let collectedData={};
  let mailFields=[];

  let renderedInputs = Array.from(wrap.querySelectorAll('input,select,textarea'));
  for(const inputEl of renderedInputs){
    let req=inputEl.required, val=inputEl.value;
    if(req && !inputEl.disabled && (val==='' || val==='請選擇')){
      fail=true; break;
    }
    if(inputEl.name){
      collectedData[inputEl.name] = (inputEl.disabled || val==='' || val==='請選擇') ? 'NA' : val;
    }
  }
  if(fail){ alert('請填寫所有欄位'); return; }

  // 設備配置
  const currentVendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY) || 'null') || [];
  const selectedSite = document.getElementById('site').value;
  const selectedVendorName = document.getElementById('vendor').value;
  const selectedVendorConfig = currentVendors.find(v => v.site===selectedSite && v.name===selectedVendorName) || {
    refrigeratorA:0, refrigeratorB:0, constantTemp:false, storageRoom:false
  };

  if(subKey==='cold'){
    mailFields.push({title:'點檢員簽名', value: collectedData['signature'] || 'NA'});

    if(selectedVendorConfig.constantTemp){
      mailFields.push({title:'常溫1冷藏溫度', value: collectedData['constant1_r'] || 'NA'});
    }else{
      mailFields.push({title:'常溫1冷藏溫度', value: 'NA (無此設備)'});
    }

    const maxA = selectedVendorConfig.refrigeratorA||0;
    const maxB = selectedVendorConfig.refrigeratorB||0;

    for(let i=1;i<=7;i++){
      if(i<=maxA) mailFields.push({title:`A${i}冷藏溫度`, value: collectedData[`A${i}_r`] || 'NA'});
      else mailFields.push({title:`A${i}冷藏溫度`, value: 'NA (無此設備)'});

      if(i<=maxB) mailFields.push({title:`B${i}冷凍溫度`, value: collectedData[`B${i}_f`] || 'NA'});
      else mailFields.push({title:`B${i}冷凍溫度`, value: 'NA (無此設備)'});

      if(i<=maxA || i<=maxB){
        mailFields.push({title:`A${i}/B${i}異常備註`, value: collectedData[`A${i}_B${i}_note`] || 'NA'});
      }else{
        mailFields.push({title:`A${i}/B${i}異常備註`, value: 'NA (無此設備)'});
      }
    }
  }
  else if(subKey==='storage'){
    mailFields.push({title:'點檢員簽名', value: collectedData['signature'] || 'NA'});
    if(selectedVendorConfig.storageRoom){
      mailFields.push({title:'溫度(°C)', value: collectedData['temp'] || 'NA'});
      mailFields.push({title:'濕度(%)', value: collectedData['humi'] || 'NA'});
      mailFields.push({title:'異常處理/備註', value: collectedData['comment'] || 'NA'});
    }else{
      mailFields.push({title:'溫度(°C)', value: 'NA (無此設備)'});
      mailFields.push({title:'濕度(%)', value: 'NA (無此設備)'});
      mailFields.push({title:'異常處理/備註', value: 'NA (無此設備)'});
    }
  }
  else{
    for(const inputEl of renderedInputs){
      const title = inputEl.getAttribute('data-title');
      if(title){
        mailFields.push({title, value: collectedData[inputEl.name] || 'NA'});
      }
    }
  }

  const mailText = mailFields.map(item => `${item.title}，${item.value}`).join('；\n');
  formData[mainKey][subKey] = { data: collectedData, mailText };

  renderSubNav(mainKey, subKey);

  // 自動跳下一個未完成（並處理：後台設無的子頁直接略過）
  let schTabs = SCHEDULES.find(s=>s.key===mainKey).subTabs;
  let curIdx = schTabs.findIndex(t=>t.key===subKey);
  let nextFound=false;

  // 取得 formsCfg
  const site=document.getElementById('site').value;
  const vendor=document.getElementById('vendor').value;
  const formsCfg = (site && vendor) ? getVendorFormsConfig(site, vendor) : null;

  for(let i=curIdx+1;i<schTabs.length;i++){
    const nextSubKey = schTabs[i].key;

    // 若後台設無：自動視為完成
    if(formsCfg && !isSubTabEnabledByAdmin(mainKey, nextSubKey, formsCfg)){
      if(!formData[mainKey][nextSubKey]){
        formData[mainKey][nextSubKey] = { data:{}, mailText: buildNAFormMailText(nextSubKey, mainKey) };
      }
      continue;
    }

    // 若設備無庫房：原本邏輯可保留（仍可填NA並完成），此處不強制跳過
    if(!formData[mainKey][nextSubKey]){
      switchSubTab(nextSubKey);
      nextFound=true;
      break;
    }
  }
  if(!nextFound) alert("本時段所有檢查項目已完成!");
}

/* ==============================
   下拉選單連動
============================== */
function syncVendorMenus(){
  const siteSel=document.getElementById('site');
  const vendorSel=document.getElementById('vendor');
  const vendorEmail=document.getElementById('vendorEmail');
  let vendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY) || '[]');

  let sites=[...new Set(vendors.map(v=>v.site))].sort();
  siteSel.innerHTML = '<option value="">請選擇</option>' + sites.map(s=>`<option value="${s}">${s}</option>`).join('');

  siteSel.onchange = function(){
    let s=siteSel.value;
    let vs=vendors.filter(v=>v.site===s);
    vendorSel.innerHTML = '<option value="">請選擇</option>' + vs.map(v=>`<option value="${v.name}">${v.name}</option>`).join('');
    vendorSel.value='';
    vendorEmail.value='';

    document.getElementById('tabContent').innerHTML='';
    document.getElementById('notice').textContent='請選擇廠商以載入點檢項目。';
    renderSubNav(currentMainTab, currentSubTab);
  };

  vendorSel.onchange = function(){
    let s=siteSel.value, n=vendorSel.value;
    let v=vendors.find(x=>x.site===s && x.name===n);
    vendorEmail.value = (v && v.email) ? v.email : '';

    if(currentMainTab!=='penalty' && s && n){
      // 選好廠商後：先自動完成後台設無的子分頁
      autoMarkDisabledSubTabsAsDone(currentMainTab);
      renderSubNav(currentMainTab, currentSubTab);
      renderTabPage(currentMainTab, currentSubTab);
    }else if(currentMainTab!=='penalty'){
      document.getElementById('tabContent').innerHTML='';
      document.getElementById('notice').textContent='請選擇廠商以載入點檢項目。';
    }
  };
}

    alert('請先填寫上方 日期、辦公區、廠商名稱、EMAIL'); return;
  }

  // night: vendor/water/safety 全無 -> 視為完成，不寄信
  if(currentMainTab==='night'){
    let cfg = getVendorFormsConfig(site, vendor);
    if(cfg && !cfg.vendor && !cfg.water && !cfg.safety){
      alert("晚間下班離開前：後台三項皆設定為無，視為已完成，無需寄送郵件。");
      return;
    }
  }

  let mainKey=currentMainTab;
  let sch=SCHEDULES.find(s=>s.key===mainKey);

  // 確保後台設無的子頁都已自動完成（含 mailText）
  autoMarkDisabledSubTabsAsDone(mainKey);

  // 檢查是否已完成（對「後台設無」會因 autoMark 而視為完成）
  let currentVendors = JSON.parse(localStorage.getItem(LS_VENDORS_KEY) || '[]');
  let selectedVendorConfig = currentVendors.find(v => v.site===site && v.name===vendor) || {};

  for(let sub of sch.subTabs){
    if(!formData[mainKey][sub.key]){
      alert(`尚未完成【${sub.label}】，請點入填寫並按「完成本項目」!`);
      return;
    }
  }

  // 組內容
  let contentList=[];
  for(let sub of sch.subTabs){
    contentList.push(`【${sub.label}】\n${formData[mainKey][sub.key].mailText}\n`);
  }

  // 存 records（原本）
  let records=JSON.parse(localStorage.getItem(LS_RECORDS_KEY)||'[]');
  for(let sub of sch.subTabs){
    records.push({
      date,
      time:new Date().toLocaleTimeString(),
      site,
      vendor,
      email:vendorEmail,
      stage:sub.label,
      content:formData[mainKey][sub.key].mailText
    });
  }
  localStorage.setItem(LS_RECORDS_KEY, JSON.stringify(records));
  if(adminLoginUser && document.getElementById('adminSectionContent')){
    adminNav('record');
  }

  let mainLabel=sch.label;
  let subject=encodeURIComponent(`${mainLabel}_${vendor}（${date}，${site}）`);
  let body=encodeURIComponent(
    `日期，${date}；\n辦公區，${site}；\n廠商名稱，${vendor}；\nEMAIL，${vendorEmail}；\n——————\n${contentList.join('\n')}`
  );

  let mailInfo=getMailInfo(site);
  let mailAddr=mailInfo.mailto;
  let ccAddr=mailInfo.cc;

  let separator = ',';

  let mailtoRecipients=[mailAddr, vendorEmail].filter(x=>x).join(separator);
  let mailtoLink=`mailto:${mailtoRecipients}?subject=${subject}&body=${body}`;
  if(ccAddr){
    let formattedCc = ccAddr.replace(/[,;]+/g, separator);
    mailtoLink += `&cc=${formattedCc}`;
  }

  let mcbox=document.getElementById('mailContentBox');
  mcbox.innerHTML=`
    <b>寄件人</b>：${[mailInfo.mailto, vendorEmail].filter(x=>x).join(',')}<br>
    ${mailInfo.cc ? '<b>CC</b>：'+mailInfo.cc+'<br>' : ''}
    <b>標題</b>：${decodeURIComponent(subject)}<br>
    <b>內容</b>：<br>${decodeURIComponent(body)}
    <div style="margin-top:13px;">
      <button onclick="navigator.clipboard.writeText(this.parentNode.parentNode.innerText);alert('已複製內容，可直接貼到郵件喔！');"
        style="font-size:1rem;padding:6px 20px;border-radius:9px;background:#ffd55f;color:#222;">複製內容</button>
    </div>
  `;
  mcbox.style.display='block';
  mcbox.scrollIntoView({behavior:'smooth'});
  setTimeout(()=>{window.location.href=mailtoLink;},500);
};

    {label:'辦公區', name:'site', type:'select', options: siteOptions, value:v.site},

  ],(data)=>{
    let admins=JSON.parse(localStorage.getItem(LS_ADMIN_KEY)||'null')||ADMIN_DEFAULT;
    admins.push(data);
    localStorage.setItem(LS_ADMIN_KEY, JSON.stringify(admins));
    adminNav('admin');
  });
};
window.editAdmin=function(i){
  let admins=JSON.parse(localStorage.getItem(LS_ADMIN_KEY)||'null')||ADMIN_DEFAULT;
  let a=admins[i];
  adminShowModal('編輯管理員',[
    {label:'帳號', name:'user', type:'text', value:a.user},
    {label:'密碼', name:'pwd', type:'password', value:a.pwd}
  ],(data)=>{
    admins[i]=data;
    localStorage.setItem(LS_ADMIN_KEY, JSON.stringify(admins));
    adminNav('admin');
  });
};
window.delAdmin=function(i){
  let admins=JSON.parse(localStorage.getItem(LS_ADMIN_KEY)||'null')||ADMIN_DEFAULT;
  if(admins.length<=1){ alert('至少保留一位管理員'); return; }
  if(confirm('確定要刪除本管理員帳號？')){
    admins.splice(i,1);
    localStorage.setItem(LS_ADMIN_KEY, JSON.stringify(admins));
    adminNav('admin');
  }
};

/* ===== 共用 Modal（原本 + linked select） ===== */
function adminShowModal(title, fields, cb, opts){
  let mask=document.createElement('div'); mask.className='admin-modal-mask';
  let modal=document.createElement('div'); modal.className='admin-modal';
  modal.innerHTML=`
    <h2>${title}</h2>
    <form id="modalForm"></form>
    <div style="text-align:right;">
      <button class="admin-btn" id="modalOK">確認</button>
      <button class="admin-btn danger" id="modalCancel">取消</button>
    </div>
  `;

  let form=modal.querySelector('#modalForm');
  let processedFields=[...fields];

  if(opts && opts.linked){
    let allSites=[...new Set(opts.EXCEL_VENDORS.map(v=>v.site))];
    let siteField=processedFields.find(f=>f.name==='site');
    let nameField=processedFields.find(f=>f.name==='name');

    if(siteField){
      siteField.options = allSites.map(s=>({value:s, text:s}));
    }
    if(nameField && siteField){
      let defaultSite = siteField.value || allSites[0];
      let defaultNames = opts.EXCEL_VENDORS.filter(v=>v.site===defaultSite).map(v=>v.name);
      nameField.options = defaultNames.map(n=>({value:n, text:n}));
    }
  }

  processedFields.forEach(f=>{
    form.innerHTML += `<label>${f.label}</label>`;
    if(f.type==='select'){
      let sel=`<select name="${f.name}" ${f.readonly?'disabled':''} required>`;
      f.options.forEach(opt=>{
        let ov = (typeof opt==='object') ? opt.value : opt;
        let ot = (typeof opt==='object') ? opt.text : opt;
        sel += `<option value="${ov}" ${String(f.value)==String(ov) ? 'selected' : ''}>${ot}</option>`;
      });
      sel += `</select>`;
      form.innerHTML += sel;
    }else{
      let inp=`<input name="${f.name}" type="${f.type}" ${f.readonly?'readonly':''} required value="${f.value||''}"`;
      if(f.min!==undefined) inp+=` min="${f.min}"`;
      if(f.max!==undefined) inp+=` max="${f.max}"`;
      inp+=`>`;
      form.innerHTML += inp;
    }
  });

  document.body.appendChild(mask);
  document.body.appendChild(modal);

  if(opts && opts.linked){
    let selSite = modal.querySelector('select[name="site"]');
    let selName = modal.querySelector('select[name="name"]');
    if(selSite && selName){
      selSite.onchange = function(){
        let site=selSite.value;
        let names = opts.EXCEL_VENDORS.filter(v=>v.site===site).map(v=>v.name);
        selName.innerHTML = names.map(x=>`<option value="${x}">${x}</option>`).join('');
      };
    }
  }

  modal.querySelector('#modalCancel').onclick=()=>{ modal.remove(); mask.remove(); };
  modal.querySelector('#modalOK').onclick=function(e){
    e.preventDefault();
    let data={};

    for(let f of processedFields){
      let input = form.querySelector(`[name="${f.name}"]`);
      if(f.readonly && input){
        data[f.name]=input.value.trim();
        continue;
      }
      let v = input ? input.value.trim() : '';
      if(input && input.required && v===''){
        alert(`請填寫${f.label}欄位`);
        return;
      }
      if(f.type==='number' && v!==''){
        let nv=parseInt(v);
        if(isNaN(nv) || (f.min!==undefined && nv<f.min) || (f.max!==undefined && nv>f.max)){
          alert(`請輸入有效的${f.label}值 (${f.min}-${f.max})`);
          return;
        }
      }
      data[f.name]=v;
    }

    cb(data);
    modal.remove(); mask.remove();
  };
}
